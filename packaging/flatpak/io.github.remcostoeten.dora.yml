id: io.github.remcostoeten.dora
runtime: org.gnome.Platform
runtime-version: '48'
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
command: dora
finish-args:
  - --socket=x11
  - --socket=wayland
  - --share=ipc
  - --share=network
  - --device=dri
  - --filesystem=home
  - --socket=ssh-auth
  - --talk-name=org.freedesktop.secrets
  - --env=WEBKIT_DISABLE_DMABUF_RENDERER=1

modules:
  - name: bun
    buildsystem: simple
    sources:
      - type: archive
        url: https://github.com/oven-sh/bun/releases/download/bun-v1.1.38/bun-linux-x64-baseline.zip
        sha256: 353e2e6d4086a09eeee984d2ed61736dcd905838ede51b82689fd7b3e95def90
    build-commands:
      - install -Dm755 bun /app/bin/bun

  - name: dora
    buildsystem: simple
    build-options:
      build-args:
        - --share=network
      env:
        PATH: /app/bin:/usr/lib/sdk/rust-stable/bin:/usr/bin:/bin
        CARGO_HOME: /run/build/dora/cargo
        RUSTUP_HOME: /run/build/dora/rustup
    build-commands:
      - bun install --frozen-lockfile
      - bun run --cwd apps/desktop build
      - cargo build --manifest-path apps/desktop/src-tauri/Cargo.toml --release
      - install -Dm755 apps/desktop/src-tauri/target/release/dora /app/bin/dora
      - install -Dm644 packaging/flatpak/io.github.remcostoeten.dora.desktop
        /app/share/applications/io.github.remcostoeten.dora.desktop
      - install -Dm644 apps/desktop/src-tauri/icons/128x128.png
        /app/share/icons/hicolor/128x128/apps/io.github.remcostoeten.dora.png
      - install -Dm644 apps/desktop/src-tauri/icons/64x64.png
        /app/share/icons/hicolor/64x64/apps/io.github.remcostoeten.dora.png
      - install -Dm644 apps/desktop/src-tauri/icons/32x32.png
        /app/share/icons/hicolor/32x32/apps/io.github.remcostoeten.dora.png
      - install -Dm644 packaging/flatpak/io.github.remcostoeten.dora.metainfo.xml
        /app/share/metainfo/io.github.remcostoeten.dora.metainfo.xml
    sources:
      - type: dir
        path: ../..
