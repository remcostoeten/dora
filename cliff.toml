[changelog]
header = ""
body = """
{% if version %}\
## [{{ version }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Unreleased]
{% endif %}\

{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}

{% for commit in commits -%}
- {% if commit.scope %}**{{ commit.scope }}**: {% endif %}{{ commit.message | upper_first | trim }}\
 ([`{{ commit.id | truncate(length=7, end="") }}`](https://github.com/remcostoeten/dora/commit/{{ commit.id }}))\
{% if commit.github.pr_number %} in [#{{ commit.github.pr_number }}](https://github.com/remcostoeten/dora/pull/{{ commit.github.pr_number }}){% endif %}\
{% if commit.github.username %} by [@{{ commit.github.username }}](https://github.com/{{ commit.github.username }}){% endif %}
{% endfor %}
{% endfor %}
"""
footer = ""
trim = true

[git]
conventional_commits = false
commit_parsers = [
    { message = "^[Cc]hore\\(release\\)", skip = true },
    { message = "^[Ww][Ii][Pp]", skip = true },
    { message = "^[Mm]erge", skip = true },
    { message = "^[Ff]eat", group = "Features" },
    { message = "^[Ff]ix", group = "Bug Fixes" },
    { message = "^[Dd]ocs", group = "Documentation" },
    { message = "^[Pp]erf", group = "Performance" },
    { message = "^[Rr]efactor", group = "Refactoring" },
    { message = "^[Tt]est", group = "Testing" },
    { message = "^[Cc]hore", group = "Chores" },
    { message = "^[Cc][Ii]", group = "CI/CD" },
    { message = "^[Ss]tyle", group = "Styling" },
    { message = "^[Bb]uild", group = "Build" },
    { message = ".*", group = "Other" },
]
filter_commits = true
tag_pattern = "v[0-9]+.*"

[remote.github]
owner = "remcostoeten"
repo = "dora"
