[changelog]
header = ""
body = """
{% if version %}\
## [{{ version }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Unreleased]
{% endif %}\

{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}

{% for commit in commits -%}
- {{ commit.message | split(pat="\n") | first | trim }}{% if commit.github.pr_number %} (#{{ commit.github.pr_number }}){% endif %}

{% endfor %}
{% endfor %}
"""
footer = ""
trim = true

[git]
conventional_commits = false
commit_parsers = [
    { message = "^[Cc]hore\\(release\\)", skip = true },
    { message = "^[Ww][Ii][Pp]", skip = true },
    { message = "^[Mm]erge", skip = true },
    { message = "^[Ff]eat", group = "Features" },
    { message = "^[Ff]ix", group = "Bug Fixes" },
    { message = "^[Dd]ocs", group = "Documentation" },
    { message = "^[Pp]erf", group = "Performance" },
    { message = "^[Rr]efactor", group = "Refactoring" },
    { message = "^[Tt]est", group = "Testing" },
    { message = "^[Cc]hore", group = "Chores" },
    { message = "^[Cc][Ii]", group = "CI/CD" },
    { message = "^[Ss]tyle", group = "Styling" },
    { message = "^[Bb]uild", group = "Build" },
    { message = ".*", group = "Other" },
]
filter_commits = true
tag_pattern = "v[0-9]+.*"

[remote.github]
owner = "remcostoeten"
repo = "dora"
