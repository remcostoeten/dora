		<script>
			;(function () {
				var themeMap = {
					dark: { bg: '#090909', bg2: '#121212', text: '#f1f1f1', muted: '#959595', accent: '#e5e5e5', accentSoft: 'rgba(229,229,229,0.2)', logo1: '#b35c5f', logo2: '#fcc5c3', logo3: '#e79898' },
					light: { bg: '#f6f6f6', bg2: '#ececec', text: '#141414', muted: '#686868', accent: '#171717', accentSoft: 'rgba(23,23,23,0.11)', logo1: '#737373', logo2: '#404040', logo3: '#525252' },
					midnight: { bg: '#0b1020', bg2: '#141b31', text: '#e8edff', muted: '#97a2c9', accent: '#818cf8', accentSoft: 'rgba(129,140,248,0.2)', logo1: '#6366f1', logo2: '#a5b4fc', logo3: '#818cf8' },
					forest: { bg: '#0d1712', bg2: '#13231b', text: '#e6f7ef', muted: '#8ea99a', accent: '#34d399', accentSoft: 'rgba(52,211,153,0.18)', logo1: '#059669', logo2: '#a7f3d0', logo3: '#34d399' },
					bloom: { bg: '#120d14', bg2: '#1c1420', text: '#f5e8f2', muted: '#b08ea8', accent: '#e879f9', accentSoft: 'rgba(232,121,249,0.18)', logo1: '#c026d3', logo2: '#f0abfc', logo3: '#e879f9' },
					claude: { bg: '#f7f0e8', bg2: '#f3e8dc', text: '#34261d', muted: '#7f6756', accent: '#d97706', accentSoft: 'rgba(217,119,6,0.17)', logo1: '#c66d1a', logo2: '#fde6c8', logo3: '#f3b478' },
					'claude-dark': { bg: '#1d1713', bg2: '#2a211b', text: '#f3e8dd', muted: '#b19a86', accent: '#b45309', accentSoft: 'rgba(180,83,9,0.2)', logo1: '#c66d1a', logo2: '#f3cfab', logo3: '#d88b43' },
					night: { bg: '#000000', bg2: '#080808', text: '#f5f5f5', muted: '#8f8f8f', accent: '#f5f5f5', accentSoft: 'rgba(245,245,245,0.17)', logo1: '#b8b8b8', logo2: '#5f5f5f', logo3: '#8b8b8b' }
				}

				function getTheme() {
					try {
						var raw = window.localStorage.getItem('dora-appearance')
						if (raw) {
							var parsed = JSON.parse(raw)
							if (parsed && typeof parsed.theme === 'string' && themeMap[parsed.theme]) {
								return parsed.theme
							}
						}
					} catch (_error) {}

					return window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark'
				}

				var palette = themeMap[getTheme()] || themeMap.dark
				var root = document.documentElement
				root.style.setProperty('--boot-bg', palette.bg)
				root.style.setProperty('--boot-bg-2', palette.bg2)
				root.style.setProperty('--boot-text', palette.text)
				root.style.setProperty('--boot-muted', palette.muted)
				root.style.setProperty('--boot-accent', palette.accent)
				root.style.setProperty('--boot-accent-soft', palette.accentSoft)
				root.style.setProperty('--boot-logo-1', palette.logo1)
				root.style.setProperty('--boot-logo-2', palette.logo2)
				root.style.setProperty('--boot-logo-3', palette.logo3)
			})()
		</script>

		<style>
			html,
			body {
				margin: 0;
				height: 100%;
				background: var(--boot-bg, #090909);
			}

			#boot-screen {
				position: fixed;
				inset: 0;
				z-index: 9999;
				display: grid;
				place-items: center;
				font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
				color: var(--boot-text, #f1f1f1);
				background:
					radial-gradient(900px 420px at 20% -10%, var(--boot-accent-soft), transparent 60%),
					linear-gradient(155deg, var(--boot-bg), var(--boot-bg-2));
				transition: opacity 280ms ease, visibility 280ms ease;
			}

			#boot-screen.boot-screen--out {
				opacity: 0;
				visibility: hidden;
				pointer-events: none;
			}

			.boot-stage {
				display: grid;
				justify-items: center;
				gap: 14px;
				text-align: center;
				animation: boot-fade-in 520ms cubic-bezier(0.16, 1, 0.3, 1);
			}

			.boot-orbit {
				position: relative;
				width: 120px;
				height: 120px;
				display: grid;
				place-items: center;
			}

			.boot-orbit::before {
				content: '';
				position: absolute;
				inset: 0;
				border-radius: 999px;
				border: 1px solid color-mix(in srgb, var(--boot-accent), transparent 72%);
				animation: boot-spin 10s linear infinite;
			}

			.boot-logo {
				width: 56px;
				height: 56px;
			}

			.boot-logo .p1 {
				fill: var(--boot-logo-1);
			}
			.boot-logo .p2 {
				fill: var(--boot-logo-2);
			}
			.boot-logo .p3 {
				fill: var(--boot-logo-3);
			}

			.boot-title {
				font-size: 1.35rem;
				font-weight: 600;
				letter-spacing: -0.02em;
			}

			.boot-status {
				display: inline-flex;
				align-items: center;
				gap: 8px;
				font-size: 0.85rem;
				color: var(--boot-muted);
			}

			.boot-dot {
				width: 7px;
				height: 7px;
				border-radius: 999px;
				background: var(--boot-accent);
				animation: boot-pulse 1.2s ease-in-out infinite;
			}

			@keyframes boot-fade-in {
				from {
					opacity: 0;
					transform: translateY(8px);
				}
				to {
					opacity: 1;
					transform: translateY(0);
				}
			}

			@keyframes boot-spin {
				to {
					transform: rotate(360deg);
				}
			}

			@keyframes boot-pulse {
				0%,
				100% {
					opacity: 0.35;
					transform: scale(0.85);
				}
				50% {
					opacity: 1;
					transform: scale(1);
				}
			}

			@media (prefers-reduced-motion: reduce) {
				#boot-screen *,
				#boot-screen::before {
					animation: none !important;
				}
			}
		</style>
	</head>

	<body>
		<div id="boot-screen" aria-live="polite" aria-busy="true">
			<div class="boot-stage">
				<div class="boot-orbit" aria-hidden="true">
					<svg class="boot-logo" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
						<path
							d="m515 153h13l18 2 22 6 16 8 15 9v2l5 2 13 13 4 5 4 7 6 10 5 11 4 13 2 13v8l8 1 16 4 24 9 16 7 16 8 14 8 8 5v2l4 1v2l4 1v2l4 2 9 8 11 14 9 18 3 12v87l-3 15-7 16-3 6 5 5 6 13 2 11v79l-5 18-7 14 1 5 7 11 3 9 1 7v75l-3 16-6 15-10 15-6 7-5 5-10 9-19 13-22 12-23 10-33 11-32 8-37 6-27 3-16 1h-54l-35-3-35-5-32-7-16-5-27-9-21-9-19-10-18-12-11-9-15-15-7-10-8-16-4-15-1-6v-73l4-17 8-13 1-3-8-16-4-15-1-9v-71l4-16 5-10 3-4-1-4-7-16-3-11-1-10v-77l3-17 6-14 10-14 17-17 14-10 21-12 21-10 19-7 19-6 28-7 23-4 10-2 24-3 20-5 16-7 8-6 6-7 3-6v-11l-4-6-7-6-7-3-16-2-5-4-2-4v-8l6-7 16-8 10-3z"
							class="p1"
						/>
						<path
							d="m505 175h29l16 3 17 6 12 7 10 8 10 10 10 15 6 14 4 18v24l8 1 26 6 35 12 23 11 16 10 10 8 6 5 9 11 6 10 4 13-1 85-3 12-6 11-7 9-9 9-13 10-22 13-23 10-25 9-36 9-28 5-36 4-14 1h-50l-36-3-28-4-29-6-26-7-23-8-18-8-21-11-14-10-13-12-7-8-7-12-3-10-1-91 5-13 7-10 9-10 14-11 15-9 16-8 25-10 27-8 32-7 40-6 23-6 17-7 14-9 10-10 6-10 3-8v-17l-5-12-7-8-8-5-7-2v-2z"
							class="p2"
						/>
						<path
							d="m267 653 4 2 12 10 19 12 22 11 23 9 29 9 24 6 33 6 35 4 14 1h63l24-2 42-6 27-6 28-8 20-7 23-10 19-10 17-12 11-9 3 3 2 5v73l-3 14-7 14-11 13-13 11-19 12-22 11-27 10-27 8-34 7-28 4-21 2-20 1h-33l-41-3-28-4-29-6-26-7-20-7-23-10-20-11-13-9-15-13-9-12-5-10-3-10-1-77z"
							class="p3"
						/>
					</svg>
				</div>
				<p class="boot-title">Dora</p>
				<p class="boot-status">
					<span class="boot-dot" aria-hidden="true"></span>
					<span>Starting workspace</span>
				</p>
			</div>
		</div>

		<div id="root"></div>
		<script type="module" src="/src/main.tsx"></script>
	</body>
</html>
