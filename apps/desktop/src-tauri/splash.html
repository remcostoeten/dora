<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Dora</title>
		<style>
			:root {
				--bg: #090909;
				--bg-2: #121212;
				--panel: #161616;
				--panel-2: #1e1e1e;
				--border: #2e2e2e;
				--logo-primary: #b35c5f;
				--logo-secondary: #fcc5c3;
				--logo-tertiary: #e79898;
				--logo-accent: #e69797;
				--logo-highlight: #fcdddc;
			}

			* {
				margin: 0;
				padding: 0;
				box-sizing: border-box;
			}

			html,
			body {
				width: 100%;
				height: 100%;
				overflow: hidden;
			}

			body {
				background: linear-gradient(155deg, var(--bg), var(--bg-2));
				display: grid;
				place-items: center;
				user-select: none;
			}

			.logo-wrap {
				width: 96px;
				height: 96px;
				padding: 10px;
				border-radius: 24px;
				display: grid;
				place-items: center;
				background: linear-gradient(165deg, var(--panel), var(--panel-2));
				border: 1px solid var(--border);
				box-shadow: 0 16px 48px rgba(0, 0, 0, 0.36);
			}

			.logo {
				width: 100%;
				height: 100%;
			}

			.logo .p1 { fill: var(--logo-primary); }
			.logo .p2 { fill: var(--logo-secondary); }
			.logo .p3 { fill: var(--logo-tertiary); }
			.logo .p4 { fill: var(--logo-accent); }
			.logo .p5 { fill: var(--logo-highlight); }
		</style>
	</head>

		<script>
			;(function () {
				const themeMap = {
					dark: {
						bg: '#090909', bg2: '#121212', panel: '#161616', panel2: '#1e1e1e', border: '#2e2e2e',
						logoPrimary: '#b35c5f', logoSecondary: '#fcc5c3', logoTertiary: '#e79898', logoAccent: '#e69797', logoHighlight: '#fcdddc'
					},
					light: {
						bg: '#f6f6f6', bg2: '#ececec', panel: '#ffffff', panel2: '#f8f8f8', border: '#e2e2e2',
						logoPrimary: '#737373', logoSecondary: '#404040', logoTertiary: '#525252', logoAccent: '#5c5c5c', logoHighlight: '#4a4a4a'
					},
					midnight: {
						bg: '#0b1020', bg2: '#141b31', panel: '#121a2d', panel2: '#1a233d', border: '#2e3860',
						logoPrimary: '#6366f1', logoSecondary: '#a5b4fc', logoTertiary: '#818cf8', logoAccent: '#7c83ff', logoHighlight: '#c7d2fe'
					},
					forest: {
						bg: '#0d1712', bg2: '#13231b', panel: '#122018', panel2: '#1a2d22', border: '#2d4a3b',
						logoPrimary: '#059669', logoSecondary: '#a7f3d0', logoTertiary: '#34d399', logoAccent: '#10b981', logoHighlight: '#d1fae5'
					},
					claude: {
						bg: '#f7f0e8', bg2: '#f3e8dc', panel: '#fffaf5', panel2: '#f8eee4', border: '#e6d7c6',
						logoPrimary: '#c66d1a', logoSecondary: '#fde6c8', logoTertiary: '#f3b478', logoAccent: '#e89a47', logoHighlight: '#fff1de'
					},
					'claude-dark': {
						bg: '#1d1713', bg2: '#2a211b', panel: '#271e19', panel2: '#342822', border: '#4f3d31',
						logoPrimary: '#c66d1a', logoSecondary: '#f3cfab', logoTertiary: '#d88b43', logoAccent: '#cb7724', logoHighlight: '#ffe2c6'
					},
					night: {
						bg: '#000000', bg2: '#080808', panel: '#060606', panel2: '#101010', border: '#242424',
						logoPrimary: '#b8b8b8', logoSecondary: '#5f5f5f', logoTertiary: '#8b8b8b', logoAccent: '#a3a3a3', logoHighlight: '#dadada'
					}
				}

				function getTheme() {
					try {
						const raw = window.localStorage.getItem('dora-appearance')
						if (raw) {
							const parsed = JSON.parse(raw)
							if (parsed && typeof parsed.theme === 'string' && themeMap[parsed.theme]) {
								return parsed.theme
							}
						}
					} catch (_e) {}
					return window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark'
				}

				const p = themeMap[getTheme()] || themeMap.dark
				const r = document.documentElement
				r.style.setProperty('--bg', p.bg)
				r.style.setProperty('--bg-2', p.bg2)
				r.style.setProperty('--panel', p.panel)
				r.style.setProperty('--panel-2', p.panel2)
				r.style.setProperty('--border', p.border)
				r.style.setProperty('--logo-primary', p.logoPrimary)
				r.style.setProperty('--logo-secondary', p.logoSecondary)
				r.style.setProperty('--logo-tertiary', p.logoTertiary)
				r.style.setProperty('--logo-accent', p.logoAccent)
				r.style.setProperty('--logo-highlight', p.logoHighlight)
			})()
		</script>
	</body>
</html>
