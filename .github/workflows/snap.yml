name: Snap

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: Existing GitHub release tag like v0.0.102. Leave empty for artifact-only builds.
        required: false
        type: string
      publish:
        description: Publish the built snap to the Snap Store.
        required: false
        type: boolean
        default: false
      release_channel:
        description: Snap Store channel to release to.
        required: false
        type: choice
        default: stable
        options:
          - stable
          - candidate
          - beta
          - edge

permissions:
  contents: write

jobs:
  snap:
    runs-on: ubuntu-latest
    env:
      SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "release" ]]; then
            TAG="${{ github.event.release.tag_name }}"
          else
            TAG="${{ inputs.tag }}"
          fi

          VERSION="$(python -c "import json; print(json.load(open('package.json'))['version'])")"
          if [[ -n "$TAG" ]]; then
            VERSION="${TAG#v}"
          fi

          CHANNEL="stable"
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            CHANNEL="${{ inputs.release_channel }}"
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "channel=$CHANNEL" >> "$GITHUB_OUTPUT"
          echo "DORA_RELEASE_VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Install Snapcraft
        shell: bash
        run: |
          if snap list snapcraft >/dev/null 2>&1; then
            sudo snap refresh snapcraft --channel=stable --classic
          else
            sudo snap install snapcraft --channel=stable --classic
          fi

      - name: Build snap
        id: build
        shell: bash
        run: |
          rm -f ./*.snap
          sudo /snap/bin/snapcraft pack --destructive-mode

          SNAP_PATH="$(find "$GITHUB_WORKSPACE" -maxdepth 1 -type f -name '*.snap' | head -n 1)"
          if [[ -z "$SNAP_PATH" ]]; then
            echo "No .snap artifact was produced." >&2
            exit 1
          fi

          echo "snap=$SNAP_PATH" >> "$GITHUB_OUTPUT"

      - name: Upload snap artifact
        uses: actions/upload-artifact@v4
        with:
          name: dora-snap-${{ steps.meta.outputs.version }}
          path: ${{ steps.build.outputs.snap }}

      - name: Upload snap to GitHub release
        if: ${{ steps.meta.outputs.tag != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload ${{ steps.meta.outputs.tag }} ${{ steps.build.outputs.snap }} --clobber

      - name: Publish snap to Snap Store
        if: ${{ env.SNAPCRAFT_STORE_CREDENTIALS != '' && (github.event_name == 'release' || inputs.publish) }}
        uses: snapcore/action-publish@v1 # no Node 22 version available yet
        with:
          snap: ${{ steps.build.outputs.snap }}
          release: ${{ steps.meta.outputs.channel }}
