name: Release

on:
  push:
    tags:
      - 'v*.*.*'
      - '!*-release'

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  preflight:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98

      - name: Validate release metadata
        shell: bash
        run: |
          set -euo pipefail

          TAG="${GITHUB_REF_NAME}"
          TAG_VERSION="${TAG#v}"

          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tags must be plain semver tags like v0.25.0. Got: $TAG" >&2
            exit 1
          fi

          ROOT_VERSION="$(node -p "require('./package.json').version")"
          DESKTOP_VERSION="$(node -p "require('./apps/desktop/package.json').version")"
          TAURI_VERSION="$(node -p "require('./apps/desktop/src-tauri/tauri.conf.json').version")"
          CARGO_VERSION="$(sed -n 's/^version = "\(.*\)"/\1/p' apps/desktop/src-tauri/Cargo.toml | head -1)"

          echo "Tag version: $TAG_VERSION"
          echo "Root package version: $ROOT_VERSION"
          echo "Desktop package version: $DESKTOP_VERSION"
          echo "Tauri version: $TAURI_VERSION"
          echo "Cargo version: $CARGO_VERSION"

          if [[ "$TAG_VERSION" != "$DESKTOP_VERSION" || "$TAG_VERSION" != "$TAURI_VERSION" || "$TAG_VERSION" != "$CARGO_VERSION" ]]; then
            echo "Tag, desktop package, Tauri config, and Cargo versions must match before building release assets." >&2
            exit 1
          fi

          if [[ "$ROOT_VERSION" != "$TAG_VERSION" ]]; then
            echo "::warning::Root package.json is $ROOT_VERSION, release app version is $TAG_VERSION. The desktop/Tauri/Cargo versions are authoritative for Dora assets."
          fi

          node <<'NODE'
          const fs = require('fs')
          const config = require('./apps/desktop/src-tauri/tauri.conf.json')
          const targets = new Set(config.bundle?.targets || [])
          const requiredTargets = ['deb', 'rpm', 'appimage', 'nsis', 'msi', 'dmg']
          const missingTargets = requiredTargets.filter((target) => !targets.has(target))
          if (missingTargets.length > 0) {
            throw new Error(`Missing Tauri bundle targets: ${missingTargets.join(', ')}`)
          }

          const requiredFiles = [
            'packaging/aur/PKGBUILD',
            'packaging/linux/dora.desktop',
            'snap/snapcraft.yaml',
            'packaging/flatpak/io.github.remcostoeten.dora.yml',
            'tools/scripts/generate-apt-repo.ts',
            'tools/scripts/generate-homebrew-cask.ts',
            'tools/scripts/generate-winget-manifest.ts'
          ]
          const missingFiles = requiredFiles.filter((file) => !fs.existsSync(file))
          if (missingFiles.length > 0) {
            throw new Error(`Missing distribution files: ${missingFiles.join(', ')}`)
          }
          NODE

  release-linux:
    needs: preflight
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98

      - name: setup node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f

      - name: setup bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6

      - name: install rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: install dependencies (ubuntu)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            patchelf

      - name: install frontend dependencies
        run: bun install
        working-directory: ./apps/desktop

      - name: build frontend
        run: bun run build
        working-directory: ./apps/desktop

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: ./apps/desktop


      - name: Build lightweight linux tarball
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          STAGE="/tmp/dora-x86_64-unknown-linux-gnu"
          rm -rf "$STAGE"
          mkdir -p "$STAGE/icons"

          # Extract the dora binary from the .deb produced by tauri-action.
          # The .deb binary is a real `tauri build` output with the Vite dist
          # embedded into the Tauri context. A bare `cargo build --release`
          # against this manifest produces a binary that falls back to devUrl
          # (http://localhost:1420), which is what broke the AUR tarball.
          DEB="$(find apps/desktop/src-tauri/target/release/bundle/deb -maxdepth 2 -name '*.deb' | head -1)"
          if [[ -z "${DEB}" ]]; then
            echo "Could not locate Tauri-built .deb for the linux tarball" >&2
            exit 1
          fi
          echo "Extracting dora binary from ${DEB}"
          DEB_EXTRACT="$(mktemp -d)"
          dpkg-deb -x "${DEB}" "${DEB_EXTRACT}"
          DEB_BIN="$(find "${DEB_EXTRACT}" -type f -name dora -path '*/bin/*' | head -1)"
          if [[ -z "${DEB_BIN}" ]]; then
            echo "Could not find dora binary inside ${DEB}" >&2
            exit 1
          fi

          install -Dm755 "${DEB_BIN}" "$STAGE/dora"
          install -Dm644 packaging/linux/dora.desktop "$STAGE/dora.desktop"
          install -Dm644 apps/desktop/src-tauri/icons/32x32.png "$STAGE/icons/32x32.png"
          install -Dm644 apps/desktop/src-tauri/icons/128x128.png "$STAGE/icons/128x128.png"

          TAR="dora-x86_64-unknown-linux-gnu.tar.gz"
          tar -C /tmp -czf "$TAR" dora-x86_64-unknown-linux-gnu
          echo "Created $TAR for version $VERSION"

      - name: generate linux checksums
        run: bun ../../tools/scripts/generate-checksums.ts --input-dir=src-tauri/target/release/bundle --output=src-tauri/target/release/bundle/checksums-linux.txt --extensions=.AppImage,.deb,.rpm
        working-directory: ./apps/desktop

      - name: upload linux checksums
        uses: actions/upload-artifact@v4
        with:
          name: release-linux-assets
          path: |
            dora-x86_64-unknown-linux-gnu.tar.gz
            ./apps/desktop/src-tauri/target/release/bundle/deb/*.deb
            ./apps/desktop/src-tauri/target/release/bundle/rpm/*.rpm
            ./apps/desktop/src-tauri/target/release/bundle/appimage/*.AppImage
            ./apps/desktop/src-tauri/target/release/bundle/checksums-linux.txt

  release-windows:
    needs: preflight
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98

      - name: setup node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f

      - name: setup bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6

      - name: install rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: install sqlite3 via vcpkg
        shell: pwsh
        run: |
          $VcpkgRoot = "C:\vcpkg"
          & "$VcpkgRoot\vcpkg.exe" install sqlite3:x64-windows
          $VcpkgLib = "$VcpkgRoot\installed\x64-windows\lib"
          $VcpkgInclude = "$VcpkgRoot\installed\x64-windows\include"
          $VcpkgBin = "$VcpkgRoot\installed\x64-windows\bin"
          echo "VCPKG_ROOT=$VcpkgRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "VCPKGRS_TRIPLET=x64-windows" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "LIB=$VcpkgLib;$env:LIB" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "INCLUDE=$VcpkgInclude;$env:INCLUDE" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "PATH=$VcpkgBin;$env:PATH" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: install frontend dependencies
        run: bun install
        working-directory: ./apps/desktop

      - name: build frontend
        run: bun run build
        working-directory: ./apps/desktop

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VCPKG_ROOT: ${{ env.VCPKG_ROOT }}
          VCPKGRS_TRIPLET: ${{ env.VCPKGRS_TRIPLET }}
          LIB: ${{ env.LIB }}
          INCLUDE: ${{ env.INCLUDE }}
        with:
          projectPath: ./apps/desktop

      - name: generate windows checksums
        run: bun ../../tools/scripts/generate-checksums.ts --input-dir=src-tauri/target/release/bundle --output=src-tauri/target/release/bundle/checksums-windows.txt --extensions=.msi,.exe
        working-directory: ./apps/desktop

      - name: upload windows checksums
        uses: actions/upload-artifact@v4
        with:
          name: release-windows-assets
          path: |
            ./apps/desktop/src-tauri/target/release/bundle/*.msi
            ./apps/desktop/src-tauri/target/release/bundle/*.exe
            ./apps/desktop/src-tauri/target/release/bundle/checksums-windows.txt

  release-macos:
    needs: preflight
    permissions:
      contents: write
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98

      - name: setup node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f

      - name: setup bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6

      - name: install rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: install frontend dependencies
        run: bun install
        working-directory: ./apps/desktop

      - name: build frontend
        run: bun run build
        working-directory: ./apps/desktop

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: ./apps/desktop

      - name: upload macOS assets
        uses: actions/upload-artifact@v4
        with:
          name: release-macos-assets
          path: |
            ./apps/desktop/src-tauri/target/release/bundle/dmg/*.dmg

  release-macos-intel:
    needs: preflight
    permissions:
      contents: write
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98

      - name: setup node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f

      - name: setup bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6

      - name: install rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: install frontend dependencies
        run: bun install
        working-directory: ./apps/desktop

      - name: build frontend
        run: bun run build
        working-directory: ./apps/desktop

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: ./apps/desktop

      - name: upload macOS Intel assets
        uses: actions/upload-artifact@v4
        with:
          name: release-macos-intel-assets
          path: |
            ./apps/desktop/src-tauri/target/release/bundle/dmg/*.dmg

  generate-release-notes:
    needs: [release-linux, release-windows, release-macos, release-macos-intel]
    permissions:
      contents: write
      actions: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: setup git-cliff
        uses: kenji-miyake/setup-git-cliff@v2

      - name: Publish release with all assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          VERSION="${{ github.ref_name }}"

          git fetch --tags origin

          PREVIOUS_TAG="$(git tag --sort=-version:refname | grep -A1 "^${VERSION}$" | tail -1 || true)"

          if [ -z "$PREVIOUS_TAG" ]; then
            echo "No previous tag found, generating notes from all commits"
            git-cliff --config cliff.toml --tag "$VERSION" --workdir . > /tmp/release-notes.md
          else
            echo "Generating notes from $PREVIOUS_TAG to $VERSION"
            git-cliff "$PREVIOUS_TAG..$VERSION" --config cliff.toml --tag "$VERSION" --workdir . > /tmp/release-notes.md
          fi

          if [ -n "$PREVIOUS_TAG" ]; then
            {
              echo ""
              echo "**Full Changelog**: https://github.com/remcostoeten/dora/compare/${PREVIOUS_TAG}...${VERSION}"
            } >> /tmp/release-notes.md
          fi

          echo "=== Generated Release Notes ==="
          cat /tmp/release-notes.md

          mkdir -p /tmp/release-assets
          gh run download "${{ github.run_id }}" -D /tmp/release-assets

          mapfile -t ASSETS < <(find /tmp/release-assets -type f | sort)
          if [ "${#ASSETS[@]}" -lt 8 ]; then
            echo "Expected at least 8 release assets, found ${#ASSETS[@]}" >&2
            find /tmp/release-assets -type f || true
            exit 1
          fi

          echo "=== Release assets (${#ASSETS[@]}) ==="
          printf '%s\n' "${ASSETS[@]}"

          if gh release view "$VERSION" >/dev/null 2>&1; then
            ASSET_COUNT="$(gh release view "$VERSION" --json assets --jq '.assets | length')"
            if [ "$ASSET_COUNT" -eq 0 ]; then
              echo "Deleting empty pre-created release $VERSION"
              gh release delete "$VERSION" --yes
            else
              echo "Release $VERSION already exists with $ASSET_COUNT assets; refusing to overwrite." >&2
              exit 1
            fi
          fi

          gh release create "$VERSION" \
            --title "Dora ${VERSION}" \
            --notes-file /tmp/release-notes.md \
            "${ASSETS[@]}"

  publish-aur:
    needs: generate-release-notes
    permissions:
      actions: write
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch AUR publish workflow
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run aur.yml --ref master -f tag="${{ github.ref_name }}"
