name: APT Repository

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Existing GitHub release tag (e.g. v0.26.6). Leave empty to use latest.
        required: false
        type: string
      publish:
        description: Publish to GitHub Pages (requires pages to be enabled).
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  apt:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6

      - name: Resolve version
        id: meta
        shell: bash
        run: |
          TAG="${{ inputs.tag }}"

          VERSION="$(python3 -c 'import json; print(json.load(open("package.json"))["version"])')"
          if [[ -n "$TAG" ]]; then
            VERSION="${TAG#v}"
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Resolve .deb asset URL
        id: deb
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ steps.meta.outputs.tag }}"
          if [[ -z "$TAG" ]]; then
            TAG="$(gh api repos/${{ github.repository }}/releases/latest --jq '.tag_name')"
          fi

          DEB_URL=""
          for attempt in {1..60}; do
            DEB_URL="$(gh api repos/${{ github.repository }}/releases/tags/${TAG} \
              --jq '.assets[] | select(.name | endswith("_amd64.deb")) | .browser_download_url' \
              | head -1)"
            if [[ -n "$DEB_URL" ]]; then
              break
            fi
            echo "Waiting for _amd64.deb asset on ${TAG} (${attempt}/60)..."
            sleep 30
          done

          if [[ -z "$DEB_URL" ]]; then
            echo "No _amd64.deb asset found on release ${TAG}. The Release workflow must publish only after Linux assets are uploaded." >&2
            exit 1
          fi
          echo "url=$DEB_URL" >> "$GITHUB_OUTPUT"
          echo "Resolved .deb: $DEB_URL"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate APT repository
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          bun tools/scripts/generate-apt-repo.ts \
            --version=${{ steps.meta.outputs.version }} \
            --deb-url=${{ steps.deb.outputs.url }} \
            --out-dir=packaging/apt

      - name: Checkout existing gh-pages content (if any)
        continue-on-error: true
        run: |
          git fetch origin gh-pages 2>/dev/null || true
          if git show-ref --verify --quiet refs/remotes/origin/gh-pages; then
            mkdir -p _site
            git archive origin/gh-pages | tar -x -C _site
          fi

      - name: Merge apt repo into site output
        run: |
          mkdir -p _site
          cp -r packaging/apt/. _site/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        if: ${{ inputs.publish }}
        id: deploy
        uses: actions/deploy-pages@v4
