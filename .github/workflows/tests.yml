name: Tests

on:
    push:
        branches:
            - main
    pull_request:

jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
            - name: Setup Bun
              uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
              with:
                  bun-version: '1.1.0'
            - name: Install dependencies
              run: bun install
            - name: Run tests
              run: bun run test
