name: Release dispatch

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Semver bump
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

concurrency:
  group: release-dispatch
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
        with:
          fetch-depth: 0
          ref: master
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install git-cliff
        uses: taiki-e/install-action@git-cliff

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Prepare release commit and tag
        id: prepare
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          bash scripts/release-prepare.sh "${{ inputs.bump }}"

      - name: Push release commit and tag
        run: |
          git push origin master
          git push origin "${{ steps.prepare.outputs.next_tag }}"

      - name: Summary
        run: |
          echo "Release ${{ steps.prepare.outputs.next_tag }} pushed."
          echo "Build pipeline: https://github.com/${{ github.repository }}/actions/workflows/release.yml"
