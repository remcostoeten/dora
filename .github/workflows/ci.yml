name: CI

on:
    push:
        branches: [main, master, develop]
    pull_request:
        branches: [main, master, develop]

env:
    CARGO_TERM_COLOR: always

jobs:
    test-typescript:
        name: TypeScript Tests
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af6834

            - name: Setup Bun
              uses: oven-sh/setup-bun@e44c7dcdda6f4d00d3d3d2ce6e20df9c90dd3b50
              with:
                  bun-version: latest

            - name: Install dependencies
              run: bun install

            - name: Run TypeScript tests
              run: bun run test:desktop

    test-rust:
        name: Rust Tests
        runs-on: ubuntu-latest
        services:
            postgres:
                image: postgres:16
                env:
                    POSTGRES_USER: postgres
                    POSTGRES_PASSWORD: postgres
                    POSTGRES_DB: test
                ports:
                    - 5432:5432
                options: >-
                    --health-cmd pg_isready
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5

        steps:
            - name: Checkout
              uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af6834

            - name: Install system dependencies
              run: |
                  sudo apt-get update
                  sudo apt-get install -y \
                    libwebkit2gtk-4.1-dev \
                    libayatana-appindicator3-dev \
                    librsvg2-dev \
                    libssl-dev \
                    libsoup-3.0-dev \
                    libjavascriptcoregtk-4.1-dev \
                    postgresql \
                    postgresql-client

            - name: Setup Rust
              uses: dtolnay/rust-toolchain@1fda3d8b0a55de20bf5124a8d4a7e3d5ca092d70

            - name: Cache Cargo
              uses: actions/cache@d4f2b089154f0998d9a79ea3cc7b28a716b3956f
              with:
                  path: |
                      ~/.cargo/bin/
                      ~/.cargo/registry/index/
                      ~/.cargo/registry/cache/
                      ~/.cargo/git/db/
                      apps/desktop/src-tauri/target/
                  key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
                  restore-keys: |
                      ${{ runner.os }}-cargo-

            - name: Run Rust tests
              working-directory: apps/desktop/src-tauri
              run: |
                  PG_BIN_DIR="$(dirname "$(find /usr/lib/postgresql -type f -name initdb | head -n1)")"
                  echo "Using PostgreSQL tools from: ${PG_BIN_DIR}"
                  export PATH="${PG_BIN_DIR}:$PATH"
                  which initdb
                  cargo test --lib
              env:
                  DATABASE_URL: postgres://postgres:postgres@localhost:5432/test

    lint:
        name: Lint
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af6834

            - name: Setup Bun
              uses: oven-sh/setup-bun@e44c7dcdda6f4d00d3d3d2ce6e20df9c90dd3b50
              with:
                  bun-version: latest

            - name: Install dependencies
              run: bun install

            - name: Run lint
              run: bun run lint

    build:
        name: Build
        needs: [test-typescript, test-rust, lint]
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af6834

            - name: Setup Bun
              uses: oven-sh/setup-bun@e44c7dcdda6f4d00d3d3d2ce6e20df9c90dd3b50

            - name: Install system dependencies
              run: |
                  sudo apt-get update
                  sudo apt-get install -y \
                    libwebkit2gtk-4.1-dev \
                    libayatana-appindicator3-dev \
                    librsvg2-dev \
                    libssl-dev \
                    libsoup-3.0-dev \
                    libjavascriptcoregtk-4.1-dev

            - name: Setup Rust
              uses: dtolnay/rust-toolchain@1fda3d8b0a55de20bf5124a8d4a7e3d5ca092d70

            - name: Install dependencies
              run: bun install

            - name: Build desktop app
              working-directory: apps/desktop
              run: bun run build
