# Copy to .dora-vm.yaml in the repo root and adjust values for your host.
name: dora-linux-test
# Use qemu:///session for repo-local storage under $HOME.
# For qemu:///system, set storage_dir outside $HOME (e.g. /var/lib/libvirt/images/dora-vm).
uri: qemu:///session
storage_dir: .cache/dora-vm

# Linux: leave base_image_url empty to auto-download Ubuntu Noble, or set your own URL.
# Windows: use a prepared Windows qcow2 with qemu-guest-agent and leave base_image_url empty
# unless you host the image at a reachable URL.
base_image: .cache/dora-vm/base.qcow2
base_image_url: https://cloud-images.ubuntu.com/noble/current/noble-server-cloudimg-amd64.img

overlay_image: .cache/dora-vm/overlay.qcow2
seed_iso: .cache/dora-vm/seed.iso
domain_xml: .cache/dora-vm/domain.xml
serial_log: .cache/dora-vm/serial.log

memory_mb: 8192
vcpus: 4
disk_size_gb: 80
network: default

# Used by `dora vm run` when --command is not provided.
guest_shell: /bin/bash -lc
guest_run_command: uname -a && echo dora vm smoke test ok
agent_timeout_sec: 180

# Windows example (requires manual base.qcow2 — no public auto-download):
# name: dora-windows-test
# guest_shell: cmd.exe /c
